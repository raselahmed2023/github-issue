<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- fonts link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Galindo&family=Geist:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- tailwind and daisy link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- styles link -->
    <link rel="stylesheet" href="styles.css">

</head>

<body class="font-geist">

    <!-- navbar -->

    <header>
        <div class="navbar bg-base-100 shadow-sm justify-between pl-8 pr-8">
            <div class="flex text-center justify-center gap-2">
                <div><img class="w-8" src="./assets/github-logo.png" alt=""></div>
                <a class=" text-xl font-bold">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="inputIssue" type="search" class="grow" placeholder="Search issues..." />
                </label>
                <button onclick="handleSearch()" class="btn btn-primary">Search</button>
            </div>
        </div>
    </header>

    <!-- all btn -->

    <section class="mx-auto w-11/12 mt-12">
        <div class="p-4 bg-base-400 shadow gap-4 ">
            <button id="all" onclick="filter('all')" class="btn btn-primary">All</button>
            <button id="open" onclick="filter('open')" class="btn">Open</button>
            <button id="closed" onclick="filter('closed')" class="btn">Closed</button>
        </div>

    </section>

    <!-- issue section -->

    <section class="mx-auto w-11/12 mt-12">

        <div class="flex bg-base-200 justify-between items-center p-4 rounded-xl">

            <div class="flex items-center gap-2">
                <img class="bg-purple-200 rounded-full p-2" src="./assets/Aperture.png" alt="">
                <div>
                    <h1 class="font-bold text-xl" id="issueCount">Issues</h1>
                    <p>Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex items-center gap-4 text-sm">
                <div class="flex items-center gap-1">
                    <span class="w-3 h-3 rounded-full bg-green-500 inline-block"></span>
                    Open
                </div>
                <div class="flex items-center gap-1">
                    <span class="w-3 h-3 rounded-full bg-purple-500 inline-block"></span>Closed
                </div>
            </div>
        </div>

    </section>

    <section id="loading" class="flex justify-center items-center py-5 hidden">
        <span class="loading loading-ring loading-xl"></span>
    </section>

    <!-- main section and issues -->

    <section id="issueCards" class="mx-auto w-11/12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
    </section>


    <section>
        <!-- Open the modal-->

        <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div id="details-Container" class="space-y-4 p-4">

                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </section>



    <script src="./scripts/main.js"></script>
</body>

</html>
