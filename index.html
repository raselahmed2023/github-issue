<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="/assets/github-logo.png" type="image/x-icon">

    <!-- fonts link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Galindo&family=Geist:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- tailwind and daisy link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- styles link -->
    <link rel="stylesheet" href="styles.css">

</head>

<body class="font-geist min-h-screen max-w-md mx-auto shadow-md bg-white">
    <div class="logo w-[100px] mx-auto pt-[80px]">
        <img src="/assets/github-logo.png" alt="">
    </div>
    <div class="text-center mt-2">
        <p class="galindo-regular text-2xl font-bold">GitHub Issues Tracker</p>
        <p>Sign in to manage your issues</p>
    </div>

    <div class="space-y-4">
        <fieldset class="fieldset bg-white w-full  p-4 ">

            <label class="label">Username</label>
            <input id="inputUsername" type="text" maxlength="5" minlength="5" class="input input-bordered w-full"
                placeholder="Enter Username" />
            <span class="text-primary text-sm">Default: admin</span>

            <label class="label">Password</label>
            <input id="inputPassword" type="password" maxlength="8" minlength="8" class="input input-bordered w-full"
                placeholder="Enter Password" />
            <span class="text-primary text-sm">Default: admin123</span>

            <button id="signIn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>


        <div class="divider text-sm text-gray-400">OR</div>
        <div class="text-center text-sm text-gray-500">
            <p>Demo Credentials:</p>
        </div>
        <div class="text-center">
            <p><span class="font-bold">Username:</span> admin</p>
            <p><span class="font-bold">Password:</span> admin123</p>
        </div>
    </div>
  

    <script src="./scripts/logIn.js"></script>

</body>

</html>
